<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端末チェックアプリ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: green; }
    </style>
</head>
<body>

    <h1>端末チェック用スキャナー</h1>
    <div id="reader"></div>
    <div id="result"></div>

    <script>
        // 100%確実に届く、公開フォーム用の送信先URLとEntry IDの組み合わせです
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScoqBmjrIcKwnfYjBYeio6tyoCKkdm7gQD_qT_oa0TQ55bhlA/formResponse";
const ENTRY_ID = "entry.860082584";

function onScanSuccess(decodedText, decodedResult) {
    document.getElementById('result').innerText = `スキャン中: ${decodedText}`;
    
    // 隠しフォームを生成して送信（CORS対策・確実性重視）
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = FORM_URL;
    form.target = 'hidden_iframe';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = ENTRY_ID;
    input.value = decodedText;

    form.appendChild(input);
    document.body.appendChild(form);
    
    let iframe = document.getElementById('hidden_iframe');
    if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'hidden_iframe';
        iframe.name = 'hidden_iframe';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
    }

    form.submit();
    document.body.removeChild(form);

    document.getElementById('result').innerText = `送信完了: 端末番号 ${decodedText}`;
    alert(`端末番号: ${decodedText} を送信しました。`);
}
    </script>
</body>
</html>
